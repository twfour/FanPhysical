services:
  - type: web
    name: fanphysical
    runtime: python
    plan: free
    buildCommand: "python3 --version"
    startCommand: "python3 -B server.py"
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_API_KEY
        sync: false
