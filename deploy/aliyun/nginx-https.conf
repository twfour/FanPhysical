server {
    listen 80;
    server_name physics.qinyibin.com;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/fanphysics/current;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name physics.qinyibin.com;

    ssl_certificate /etc/nginx/ssl/physics.qinyibin.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/physics.qinyibin.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 256k;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/fanphysics/current;
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /assets/ {
        root /opt/fanphysics/current;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /data/ {
        root /opt/fanphysics/current;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /notebooklm {
        return 308 /notebooklm/;
    }

    location ^~ /notebooklm/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /models {
        return 308 /models/;
    }

    location ^~ /models/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = / {
        root /opt/fanphysics/current;
        add_header Cache-Control "no-cache" always;
        try_files /classical-mechanics-demo.html =404;
    }

    location / {
        root /opt/fanphysics/current;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /classical-mechanics-demo.html;
    }
}
